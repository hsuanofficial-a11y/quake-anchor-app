
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>地震速報主播稿生成器</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --muted: #9fb0d0;
      --text: #eef3ff;
      --accent: #7aa2ff;
      --border: #253055;
      --ok: #22c55e;
      --err: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #11182f 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero {
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.15;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      margin-top: 24px;
    }
    .card {
      background: rgba(18, 25, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .uploader {
      border: 2px dashed #38508a;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: .2s ease;
    }
    .uploader:hover { border-color: var(--accent); }
    .uploader input { display: none; }
    .preview {
      margin-top: 14px;
      width: 100%;
      display: none;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .btn {
      appearance: none;
      border: 0;
      width: 100%;
      padding: 14px 16px;
      margin-top: 16px;
      border-radius: 12px;
      background: var(--accent);
      color: #081021;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
    }
    .btn[disabled] {
      opacity: .6;
      cursor: wait;
    }
    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .output h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 700;
    }
    .box {
      background: #0e152c;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 92px;
      white-space: pre-wrap;
      line-height: 1.8;
    }
    .title-box {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.5;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .status {
      margin-top: 10px;
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
    }
    .status.error { color: #ffb4b4; }
    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
    }
    @media (max-width: 840px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>地震速報主播稿生成器</h1>
      <p>上傳中央氣象署地震速報圖卡，幾秒內生成「主播文稿」與「新聞標題」。適合黑客松展示、新聞台內部工具雛形，或快速驗證產品概念。</p>
    </div>

    <div class="grid">
      <div class="card">
        <label class="uploader" for="imageInput">
          <strong>點我上傳圖卡</strong><br>
          <span style="color:#9fb0d0;font-size:14px;">支援 JPG、PNG、WEBP</span>
          <input id="imageInput" type="file" accept="image/*">
        </label>

        <img id="preview" class="preview" alt="預覽圖">

        <button id="generateBtn" class="btn">生成主播文稿</button>
        <div id="status" class="status"></div>

        <div class="footer">
          小提醒：這個版本是簡易 MVP，靠 AI 直接讀圖，不需要另外做 OCR。
        </div>
      </div>

      <div class="card output">
        <div class="label">新聞標題</div>
        <div id="titleBox" class="box title-box">上傳圖卡後，這裡會出現標題。</div>

        <div style="height:14px;"></div>

        <div class="label">主播文稿</div>
        <div id="scriptBox" class="box">上傳圖卡後，這裡會出現主播可直接朗讀的文稿。</div>

        <div class="row">
          <button id="copyTitle" class="btn ghost" type="button">複製標題</button>
          <button id="copyScript" class="btn ghost" type="button">複製文稿</button>
        </div>
      </div>
    </div>
  </div>

<script>
const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');
const generateBtn = document.getElementById('generateBtn');
const statusEl = document.getElementById('status');
const titleBox = document.getElementById('titleBox');
const scriptBox = document.getElementById('scriptBox');
const copyTitle = document.getElementById('copyTitle');
const copyScript = document.getElementById('copyScript');

imageInput.addEventListener('change', () => {
  const file = imageInput.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  preview.src = url;
  preview.style.display = 'block';
  statusEl.textContent = `已選擇：${file.name}`;
  statusEl.className = 'status';
});

generateBtn.addEventListener('click', async () => {
  const file = imageInput.files[0];
  if (!file) {
    statusEl.textContent = '請先選擇一張地震速報圖卡。';
    statusEl.className = 'status error';
    return;
  }

  const form = new FormData();
  form.append('image', file);

  generateBtn.disabled = true;
  generateBtn.textContent = '生成中...';
  statusEl.textContent = 'AI 正在讀取圖卡並整理主播稿，請稍候。';
  statusEl.className = 'status';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      body: form
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || '發生未知錯誤');
    }

    titleBox.textContent = data.title || '未生成標題';
    scriptBox.textContent = data.script || '未生成文稿';
    statusEl.textContent = '生成完成。';
    statusEl.className = 'status';
  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'status error';
  } finally {
    generateBtn.disabled = false;
    generateBtn.textContent = '生成主播文稿';
  }
});

async function copyText(text, label) {
  try {
    await navigator.clipboard.writeText(text);
    statusEl.textContent = `${label}已複製。`;
    statusEl.className = 'status';
  } catch {
    statusEl.textContent = `無法複製${label}，請手動複製。`;
    statusEl.className = 'status error';
  }
}

copyTitle.addEventListener('click', () => copyText(titleBox.textContent, '標題'));
copyScript.addEventListener('click', () => copyText(scriptBox.textContent, '文稿'));
</script>
</body>
</html>
